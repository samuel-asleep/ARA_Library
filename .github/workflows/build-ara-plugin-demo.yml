name: Build ARAPluginDemo VST3

on:
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Linux native build (Debug, for IPC testing without Wine)
  # ---------------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Check out ARA_Library
        uses: actions/checkout@v4
        with:
          path: ARA_Library

      - name: Clone JUCE_ARA
        run: |
          git clone --depth 1 --branch develop \
            https://github.com/Celemony/JUCE_ARA.git \
            "$GITHUB_WORKSPACE/ARA_Library/JUCE_ARA"

      - name: Check out ARA_API
        uses: actions/checkout@v4
        with:
          repository: Celemony/ARA_API
          path: ARA_SDK/ARA_API

      - name: Assemble ARA SDK umbrella
        run: |
          ln -s "$GITHUB_WORKSPACE/ARA_Library" "$GITHUB_WORKSPACE/ARA_SDK/ARA_Library"

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            libasound2-dev libfreetype-dev libcurl4-openssl-dev \
            libx11-dev libxinerama-dev libxrandr-dev libxcursor-dev \
            libxcomposite-dev libwebkit2gtk-4.1-dev libgtk-3-dev pkg-config

      - name: CMake configure
        run: |
          cmake \
            -B "$GITHUB_WORKSPACE/build" \
            -S "$GITHUB_WORKSPACE/ARA_Library/JUCE_ARA" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DJUCE_BUILD_EXAMPLES=ON \
            -DJUCE_BUILD_EXTRAS=OFF \
            -DJUCE_GLOBAL_ARA_SDK_PATH="$GITHUB_WORKSPACE/ARA_SDK" \
            -DJUCE_COPY_PLUGIN_AFTER_BUILD=OFF

      - name: Build ARAPluginDemo_VST3
        run: |
          cmake --build "$GITHUB_WORKSPACE/build" \
            --target ARAPluginDemo_VST3 \
            --parallel $(nproc)

      - name: Upload Linux VST3
        uses: actions/upload-artifact@v4
        with:
          name: ARAPluginDemo-VST3-linux-debug
          path: ${{ github.workspace }}/build/**/*VST3*/**
          if-no-files-found: warn
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Windows build (Debug, MSVC, for Wine testing)
  # ---------------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out ARA_Library
        uses: actions/checkout@v4
        with:
          path: ARA_Library

      - name: Clone JUCE_ARA
        shell: bash
        run: |
          git clone --depth 1 --branch develop \
            https://github.com/Celemony/JUCE_ARA.git \
            "$GITHUB_WORKSPACE/ARA_Library/JUCE_ARA"

      - name: Check out ARA_API
        uses: actions/checkout@v4
        with:
          repository: Celemony/ARA_API
          path: ARA_SDK/ARA_API

      - name: Assemble ARA SDK umbrella
        shell: bash
        run: |
          # On Windows we copy instead of symlink for MSVC compatibility
          cp -r "$GITHUB_WORKSPACE/ARA_Library" "$GITHUB_WORKSPACE/ARA_SDK/ARA_Library"

      - name: CMake configure (MSVC)
        shell: bash
        run: |
          cmake \
            -B "$GITHUB_WORKSPACE/build" \
            -S "$GITHUB_WORKSPACE/ARA_Library/JUCE_ARA" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DJUCE_BUILD_EXAMPLES=ON \
            -DJUCE_BUILD_EXTRAS=OFF \
            -DJUCE_GLOBAL_ARA_SDK_PATH="$GITHUB_WORKSPACE/ARA_SDK" \
            -DJUCE_COPY_PLUGIN_AFTER_BUILD=OFF

      - name: Build ARAPluginDemo_VST3
        shell: bash
        run: |
          cmake --build "$GITHUB_WORKSPACE/build" \
            --target ARAPluginDemo_VST3 \
            --config Debug \
            --parallel

      - name: Bundle MSVC Debug runtime DLLs
        shell: pwsh
        run: |
          # Find MSVC Debug runtime DLLs installed on the runner
          # These are needed by Wine to load the Debug VST3 build
          $vcToolsDir = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -property installationPath
          $vstDest = "$env:GITHUB_WORKSPACE\build\examples\Plugins\ARAPluginDemo_artefacts\Debug\VST3\ARAPluginDemo.vst3\Contents\x86_64-win"

          $dlls = @("MSVCP140D.dll","VCRUNTIME140D.dll","VCRUNTIME140_1D.dll","ucrtbased.dll")
          foreach ($dll in $dlls) {
            $found = Get-ChildItem -Path "$vcToolsDir" -Filter $dll -Recurse -ErrorAction SilentlyContinue |
                     Where-Object { $_.FullName -match "x64" } |
                     Select-Object -First 1
            if ($found) {
              Copy-Item $found.FullName -Destination $vstDest
              Write-Host "Copied: $dll"
            } else {
              Write-Warning "Not found: $dll"
            }
          }
          # ucrtbased is in Windows SDK
          $ucrtDir = "${env:ProgramFiles(x86)}\Windows Kits\10\bin"
          $ucrtFound = Get-ChildItem -Path $ucrtDir -Filter "ucrtbased.dll" -Recurse -ErrorAction SilentlyContinue |
                       Where-Object { $_.FullName -match "x64" } |
                       Select-Object -First 1
          if ($ucrtFound) {
            Copy-Item $ucrtFound.FullName -Destination $vstDest -Force
            Write-Host "Copied: ucrtbased.dll from Windows SDK"
          }

      - name: Locate VST3
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/build" -name "*.vst3" -o -name "*.dll" \
            | grep -i "ARAPlugin" | head -20

      - name: Upload Windows VST3
        uses: actions/upload-artifact@v4
        with:
          name: ARAPluginDemo-VST3-windows-debug
          path: |
            ${{ github.workspace }}/build/**/*.vst3
            ${{ github.workspace }}/build/**/*ARAPlugin*.dll
          if-no-files-found: warn
          retention-days: 30
