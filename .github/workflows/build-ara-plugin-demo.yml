name: Build ARAPluginDemo VST3

on:
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Linux native build (Debug, for IPC testing without Wine)
  # ---------------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Check out ARA_Library
        uses: actions/checkout@v4
        with:
          path: ARA_Library

      - name: Clone JUCE_ARA
        run: |
          git clone --depth 1 --branch develop \
            https://github.com/Celemony/JUCE_ARA.git \
            "$GITHUB_WORKSPACE/ARA_Library/JUCE_ARA"

      - name: Check out ARA_API
        uses: actions/checkout@v4
        with:
          repository: Celemony/ARA_API
          path: ARA_SDK/ARA_API

      - name: Assemble ARA SDK umbrella
        run: |
          ln -s "$GITHUB_WORKSPACE/ARA_Library" "$GITHUB_WORKSPACE/ARA_SDK/ARA_Library"

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            libasound2-dev libfreetype-dev libcurl4-openssl-dev \
            libx11-dev libxinerama-dev libxrandr-dev libxcursor-dev \
            libxcomposite-dev libwebkit2gtk-4.1-dev libgtk-3-dev pkg-config

      - name: CMake configure
        run: |
          cmake \
            -B "$GITHUB_WORKSPACE/build" \
            -S "$GITHUB_WORKSPACE/ARA_Library/JUCE_ARA" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DJUCE_BUILD_EXAMPLES=ON \
            -DJUCE_BUILD_EXTRAS=OFF \
            -DJUCE_GLOBAL_ARA_SDK_PATH="$GITHUB_WORKSPACE/ARA_SDK" \
            -DJUCE_COPY_PLUGIN_AFTER_BUILD=OFF

      - name: Build ARAPluginDemo_VST3
        run: |
          cmake --build "$GITHUB_WORKSPACE/build" \
            --target ARAPluginDemo_VST3 \
            --parallel $(nproc)

      - name: Upload Linux VST3
        uses: actions/upload-artifact@v4
        with:
          name: ARAPluginDemo-VST3-linux-debug
          path: ${{ github.workspace }}/build/**/*VST3*/**
          if-no-files-found: warn
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Windows build (Debug, MSVC) — kept for reference
  # ---------------------------------------------------------------------------
  build-windows-debug:
    runs-on: windows-latest

    steps:
      - name: Check out ARA_Library
        uses: actions/checkout@v4
        with:
          path: ARA_Library

      - name: Clone JUCE_ARA
        shell: bash
        run: |
          git clone --depth 1 --branch develop \
            https://github.com/Celemony/JUCE_ARA.git \
            "$GITHUB_WORKSPACE/ARA_Library/JUCE_ARA"

      - name: Check out ARA_API
        uses: actions/checkout@v4
        with:
          repository: Celemony/ARA_API
          path: ARA_SDK/ARA_API

      - name: Assemble ARA SDK umbrella
        shell: bash
        run: |
          cp -r "$GITHUB_WORKSPACE/ARA_Library" "$GITHUB_WORKSPACE/ARA_SDK/ARA_Library"

      - name: CMake configure (MSVC Debug)
        shell: bash
        run: |
          cmake \
            -B "$GITHUB_WORKSPACE/build" \
            -S "$GITHUB_WORKSPACE/ARA_Library/JUCE_ARA" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DJUCE_BUILD_EXAMPLES=ON \
            -DJUCE_BUILD_EXTRAS=OFF \
            -DJUCE_GLOBAL_ARA_SDK_PATH="$GITHUB_WORKSPACE/ARA_SDK" \
            -DJUCE_COPY_PLUGIN_AFTER_BUILD=OFF

      - name: Build ARAPluginDemo_VST3 (Debug)
        shell: bash
        run: |
          cmake --build "$GITHUB_WORKSPACE/build" \
            --target ARAPluginDemo_VST3 \
            --config Debug \
            --parallel

      - name: Upload Windows VST3 (Debug)
        uses: actions/upload-artifact@v4
        with:
          name: ARAPluginDemo-VST3-windows-debug
          path: ${{ github.workspace }}/build/**/Debug/VST3/**
          if-no-files-found: warn
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Windows build (Release, MSVC) — no debug CRT, works cleanly under Wine
  # ---------------------------------------------------------------------------
  build-windows-release:
    runs-on: windows-latest

    steps:
      - name: Check out ARA_Library
        uses: actions/checkout@v4
        with:
          path: ARA_Library

      - name: Clone JUCE_ARA
        shell: bash
        run: |
          git clone --depth 1 --branch develop \
            https://github.com/Celemony/JUCE_ARA.git \
            "$GITHUB_WORKSPACE/ARA_Library/JUCE_ARA"

      - name: Check out ARA_API
        uses: actions/checkout@v4
        with:
          repository: Celemony/ARA_API
          path: ARA_SDK/ARA_API

      - name: Assemble ARA SDK umbrella
        shell: bash
        run: |
          cp -r "$GITHUB_WORKSPACE/ARA_Library" "$GITHUB_WORKSPACE/ARA_SDK/ARA_Library"

      - name: CMake configure (MSVC Release)
        shell: bash
        run: |
          cmake \
            -B "$GITHUB_WORKSPACE/build" \
            -S "$GITHUB_WORKSPACE/ARA_Library/JUCE_ARA" \
            -DCMAKE_BUILD_TYPE=Release \
            -DJUCE_BUILD_EXAMPLES=ON \
            -DJUCE_BUILD_EXTRAS=OFF \
            -DJUCE_GLOBAL_ARA_SDK_PATH="$GITHUB_WORKSPACE/ARA_SDK" \
            -DJUCE_COPY_PLUGIN_AFTER_BUILD=OFF

      - name: Build ARAPluginDemo_VST3 (Release)
        shell: bash
        run: |
          cmake --build "$GITHUB_WORKSPACE/build" \
            --target ARAPluginDemo_VST3 \
            --config Release \
            --parallel

      - name: Upload Windows VST3 (Release)
        uses: actions/upload-artifact@v4
        with:
          name: ARAPluginDemo-VST3-windows-release
          path: ${{ github.workspace }}/build/**/Release/VST3/**
          if-no-files-found: warn
          retention-days: 30
